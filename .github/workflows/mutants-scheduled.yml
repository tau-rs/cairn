name: Mutation testing (scheduled)

# cargo-mutants run on a weekly schedule, one matrix entry per crate.
#
# TIER 3 — scheduled drift-catcher. NON-BLOCKING and OFF the release critical
# path: a separate workflow file, never part of ci.yml's `ci-summary`, so it
# cannot gate a merge or a release. Missed mutants are a SIGNAL (a test gap),
# surfaced as an artifact — not a release blocker.
#
# Mutation testing complements the unit + doc-test suites by mutating
# production code (operator flips, returns, conditionals) and verifying that at
# least one test catches each mutation. The output is an objective "test catch
# rate" per crate.
#
# Why scheduled (not per-PR): a full workspace run is hours. Per-crate runs are
# minutes each but the matrix totals add up. Weekly cadence catches drift
# (catch rate dropping after a large refactor) without burning CI budget on
# every commit.
#
# Shared definitions: the cargo-mutants setup (`=27.1.0`, `--in-place`,
# `--no-shuffle`) is identical to the mutants job in the T2 `heavy.yml`
# (session 82); the cross-repo sync mechanism keeps them aligned. There is NO
# runtime `workflow_call` coupling, so this schedule stands alone.
#
# Each matrix entry uploads `mutants.out/` as an artifact, which includes the
# list of every mutation that NO test caught — the canonical test-gap report.

on:
  schedule:
    # 06:00 UTC every Sunday. Off-peak so it doesn't compete with weekday PR CI.
    - cron: "0 6 * * 0"
  workflow_dispatch:
    inputs:
      crate:
        description: "Crate to test (default: all). Use a crate name like 'cairn-domain' to scope."
        type: string
        required: false
        default: "all"
      timeout_seconds:
        description: "Per-mutant timeout in seconds (default 300)"
        type: string
        required: false
        default: "300"

permissions:
  contents: read
  # For future use: uploading artifacts and (optionally) auto-filing issues when
  # missed-mutant count regresses week-over-week.
  issues: write

concurrency:
  # Singleton across schedule + manual dispatch — a manual run shouldn't kill the
  # scheduled run mid-flight, but two manuals can coexist (different crate scopes).
  group: mutants-scheduled-${{ inputs.crate || 'all' }}
  cancel-in-progress: false

jobs:
  mutants:
    name: mutants (${{ matrix.crate }})
    runs-on: ubuntu-latest
    # 4 hours per crate — cargo-mutants is slow. Safer to budget generously than
    # to time-out half-way.
    timeout-minutes: 240
    strategy:
      fail-fast: false
      matrix:
        # Crates ordered by expected value: parsers / domain / kernel-level code
        # first, plumbing crates later. Add new entries as the workspace grows.
        crate:
          - cairn-domain
          - cairn-plugin-protocol
          - cairn-ports
          - cairn-infra
          - cairn-service
          - cairn-app
          - cairn-contract
          - cairn-cli
          - cairn-daemon
          - cairn-plugin-sdk

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - name: Skip if manual dispatch targets a different crate
        id: precheck
        env:
          INPUT_CRATE: ${{ inputs.crate || 'all' }}
          MATRIX_CRATE: ${{ matrix.crate }}
        run: |
          set -euo pipefail
          if [ "$INPUT_CRATE" != "all" ] && [ "$INPUT_CRATE" != "$MATRIX_CRATE" ]; then
            echo "manual dispatch scoped to '$INPUT_CRATE' — skipping $MATRIX_CRATE"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        if: steps.precheck.outputs.skip != 'true'

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
        if: steps.precheck.outputs.skip != 'true'
        with:
          shared-key: linux
          # Don't save the cache here — ci.yml is authoritative for the `linux`
          # key. Read-only cache use.
          save-if: "false"

      - uses: taiki-e/install-action@fa8484446eeba15720aa701ffc5dcb6dfa092ff1  # nextest
        if: steps.precheck.outputs.skip != 'true'

      - name: Install cargo-mutants
        if: steps.precheck.outputs.skip != 'true'
        run: cargo install cargo-mutants --locked --version =27.1.0

      - name: Run mutation testing
        if: steps.precheck.outputs.skip != 'true'
        env:
          CRATE: ${{ matrix.crate }}
          TIMEOUT: ${{ inputs.timeout_seconds || '300' }}
        run: |
          set -euo pipefail
          # `--in-place` reuses the workspace tree (faster than copying); safe
          # because the runner is throwaway. `--timeout` overrides the per-run
          # budget from the workflow_dispatch input. `--no-shuffle` makes the
          # missed-list diff-friendly week over week.
          cargo mutants \
            --in-place \
            -p "$CRATE" \
            --timeout "$TIMEOUT" \
            --no-shuffle

      - name: Upload mutation report
        if: steps.precheck.outputs.skip != 'true' && always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: mutants-${{ matrix.crate }}-${{ github.run_id }}
          path: mutants.out/
          if-no-files-found: ignore
          retention-days: 90
