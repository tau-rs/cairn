name: Claude review

# AI code review via anthropics/claude-code-action.
#
# Modes:
#   1. PR auto-review — every non-draft PR opened/pushed gets a fresh
#      Claude review comment.
#   2. Manual re-review — add the `claude:review` label to re-run.
#
# Distinct from claude.yml (the @claude mention bot): this one is
# event-driven, non-interactive.
#
# ENABLE (two steps — kept OFF by default so PRs stay green until set up)
# ----------------------------------------------------------------------
#   1. Add the `CLAUDE_CODE_OAUTH_TOKEN` secret (see claude.yml header;
#      `claude setup-token`), and install the Claude GitHub App on the repo.
#   2. Turn the gate on:
#        gh variable set CLAUDE_REVIEW_ENABLED --body true
#   Until the variable is `true`, the review job is skipped entirely
#   (no failing check on PRs).
#
# Security: uses `pull_request` (not `pull_request_target`), so fork PRs
# cannot access the secret. Untrusted PR fields are only consumed by the
# action as data, never injected into a shell `run:` step.

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, labeled]

concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

# Default to no permissions at the workflow level; the `review-pr` job below
# elevates only the scopes the action needs. Any future job added without
# its own block inherits this deny-all default.
permissions: {}

jobs:
  review-pr:
    name: review PR
    # Skip Dependabot PRs: GitHub withholds repo secrets from
    # Dependabot-triggered runs, so CLAUDE_CODE_OAUTH_TOKEN is empty and
    # the action can only fail. Dependency bumps still get the full
    # build/test/clippy/cargo-deny suite via ci.yml.
    if: |
      vars.CLAUDE_REVIEW_ENABLED == 'true' &&
      github.actor != 'dependabot[bot]' && (
        (github.event.action == 'labeled' &&
          github.event.label.name == 'claude:review') ||
        (github.event.action != 'labeled' &&
          github.event.pull_request.draft == false)
      )
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write
      id-token: write

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@4d7e1f0cd85743fdc93b1c8040ab54395da024e2 # v1.0.149
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Pin the model explicitly: the action's built-in default
          # (claude-sonnet-4-20250514) has been retired and now 404s, so
          # relying on it breaks every review run. In action v1.x the model
          # is set via claude_args, not the removed `model:` input. Bump as
          # newer Sonnets ship.
          claude_args: "--model claude-sonnet-4-6"
          # `prompt:` replaces the v0 `direct_prompt:` input.
          prompt: |
            Review this pull request as a senior engineer would.
            Focus on:
              - Correctness bugs and edge cases the tests miss
              - Security issues (input validation, auth, injection)
              - Performance regressions
              - API/contract changes that affect callers
              - Readability only when it is actively harmed
            Skip formatting nits (rustfmt enforces those) and
            clippy-caught issues (the clippy job covers those).
            Be concise. If the PR is in great shape, say so plainly
            instead of inventing nits.
