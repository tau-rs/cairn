name: coverage

# Measurement, not gating. Coverage is a signal to inform refactors and
# spot zero-coverage modules; never a hard threshold (a hard gate
# incentivizes test-for-coverage-not-correctness).

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: coverage-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CARGO_INCREMENTAL: 0

permissions:
  contents: read

jobs:
  coverage:
    name: cargo llvm-cov nextest
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: ./.github/actions/setup-rust
        with:
          components: llvm-tools-preview
          shared-key: linux
          with-nextest: true
          with-sccache: true
          with-mold: true
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@7a79fe8c3a13344501c80d99cae481c1c9085912 # v2.81.10
        with:
          tool: cargo-llvm-cov
      - name: Generate lcov coverage
        run: |
          cargo llvm-cov nextest \
            --workspace --no-fail-fast \
            --lcov --output-path lcov.info \
            --ignore-filename-regex '(tests/|/target/|/build\.rs$)'
      - name: Summarise coverage
        run: |
          covered=$(grep -h '^DA:' lcov.info | awk -F, '$2!="0"{c++} END{print c+0}')
          total=$(grep -h '^DA:' lcov.info | wc -l)
          if [ "$total" -gt 0 ]; then
            pct=$(awk "BEGIN{printf \"%.1f\", ($covered/$total)*100}")
          else
            pct="0.0"
          fi
          {
            echo "## Coverage baseline"
            echo
            echo "- **Line coverage:** ${pct}% (${covered} / ${total})"
            echo "- LCOV artifact attached to this run."
            echo
            echo "Coverage is a signal, not a gate."
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload lcov artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: lcov-${{ github.sha }}
          path: lcov.info
          retention-days: 14
